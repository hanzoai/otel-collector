name: Build & Push to GHCR

on:
  push:
    branches: [main, rebrand/hanzo-o11y]
    tags: [v*]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-collector:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build Go binary
        run: |
          mkdir -p .build/linux-amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o .build/linux-amd64/hanzo-otel-collector ./cmd/o11yotelcollector
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/hanzoai/otel-collector
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cmd/o11yotelcollector/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TARGETOS=linux
            TARGETARCH=amd64

  build-schema-migrator:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build Go binary
        run: |
          mkdir -p .build/linux-amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o .build/linux-amd64/o11y-schema-migrator ./cmd/o11yschemamigrator
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/hanzoai/o11y-schema-migrator
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cmd/o11yschemamigrator/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TARGETOS=linux
            TARGETARCH=amd64
